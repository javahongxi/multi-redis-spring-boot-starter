# Scenario 1: Official format only (Redis Cluster mode)
# Run: mvn spring-boot:run -Dspring-boot.run.profiles=official
#
# Also supports official standalone format:
#   spring.data.redis.host: localhost
#   spring.data.redis.port: 6379
spring:
  data:
    redis:
      cluster:
        nodes: localhost:7001,localhost:7002,localhost:7003
        max-redirects: 3
